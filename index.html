<style>
  :root {
    --giallo: #F2C000;
    --viola: #6B4A9E;
    --viola-scuro: #4A3070;
    --panna: #F3E3C6;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    position: relative;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
    background: var(--giallo);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    overflow-x: hidden;
  }
  body::before, body::after {
    content: '';
    position: fixed;
    border-radius: 50%;
    filter: blur(70px);
    z-index: 0;
  }
  body::before {
    width: 420px; height: 420px;
    background: rgba(255,255,255,0.55);
    top: -120px; left: -140px;
  }
  body::after {
    width: 520px; height: 520px;
    background: rgba(107,74,158,0.35);
    bottom: -180px; right: -160px;
  }
  .card { position: relative; z-index: 1; }
  .card {
    width: 100%;
    max-width: 400px;
    text-align: center;
  }
  .polpo {
    width: 290px;
    height: 290px;
    object-fit: cover;
    border-radius: 50%;
    border: 3px solid var(--viola);
    margin-bottom: 10px;
  }
  .payoff {
    margin: 18px 0 34px;
  }
  @keyframes orbita {
    from { transform: rotate(0deg) translateX(9px) rotate(0deg); }
    to   { transform: rotate(360deg) translateX(9px) rotate(-360deg); }
  }
  @keyframes dondolio {
    0.0% { transform: translate(0.00px, 0.00px) rotate(3.20deg); }
    5.0% { transform: translate(0.00px, 0.00px) rotate(3.04deg); }
    10.0% { transform: translate(0.00px, 0.00px) rotate(2.59deg); }
    15.0% { transform: translate(0.00px, 0.00px) rotate(1.88deg); }
    20.0% { transform: translate(0.00px, 0.00px) rotate(0.99deg); }
    25.0% { transform: translate(0.00px, 0.00px) rotate(0.00deg); }
    30.0% { transform: translate(-0.00px, 0.00px) rotate(-0.99deg); }
    35.0% { transform: translate(-0.00px, 0.00px) rotate(-1.88deg); }
    40.0% { transform: translate(-0.00px, 0.00px) rotate(-2.59deg); }
    45.0% { transform: translate(-0.00px, 0.00px) rotate(-3.04deg); }
    50.0% { transform: translate(-0.00px, 0.00px) rotate(-3.20deg); }
    55.0% { transform: translate(-0.00px, -0.00px) rotate(-3.04deg); }
    60.0% { transform: translate(-0.00px, -0.00px) rotate(-2.59deg); }
    65.0% { transform: translate(-0.00px, -0.00px) rotate(-1.88deg); }
    70.0% { transform: translate(-0.00px, -0.00px) rotate(-0.99deg); }
    75.0% { transform: translate(-0.00px, -0.00px) rotate(-0.00deg); }
    80.0% { transform: translate(0.00px, -0.00px) rotate(0.99deg); }
    85.0% { transform: translate(0.00px, -0.00px) rotate(1.88deg); }
    90.0% { transform: translate(0.00px, -0.00px) rotate(2.59deg); }
    95.0% { transform: translate(0.00px, -0.00px) rotate(3.04deg); }
    100.0% { transform: translate(0.00px, -0.00px) rotate(3.20deg); }
  }
    .orbita {
    display: inline-block;
    animation: orbita 11s linear infinite;
    will-change: transform;
  }
  @keyframes fluttua {
    0%, 100% { transform: translateY(0) rotate(-1deg); }
    50%      { transform: translateY(-12px) rotate(1deg); }
  }
  @keyframes fluttua2 {
    0%, 100% { transform: translateY(0) rotate(1.5deg); }
    50%      { transform: translateY(-9px) rotate(-1deg); }
  }
  .payoff .uno { animation: fluttua 5.5s ease-in-out infinite; }
  .payoff .due { animation: fluttua2 6.5s ease-in-out infinite 0.6s; }
  .zona-polpo {
    position: relative;
    display: inline-block;
  }
  .bolle {
    position: absolute;
    left: 0; top: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 2;
  }
  .bolla {
    position: absolute;
    border-radius: 50%;
    background:
      radial-gradient(circle at 30% 26%, rgba(255,255,255,0.95) 0%, rgba(255,255,255,0.35) 18%, rgba(255,255,255,0.06) 38%, rgba(255,255,255,0) 55%),
      radial-gradient(circle at 72% 74%, rgba(107,74,158,0.45) 0%, rgba(107,74,158,0.12) 40%, rgba(107,74,158,0) 62%);
    border: 1px solid rgba(255,255,255,0.6);
    box-shadow:
      inset 0 0 12px rgba(107,74,158,0.35),
      inset -3px -4px 10px rgba(74,48,112,0.28),
      0 0 10px rgba(255,255,255,0.35);
    opacity: 0;
    will-change: transform, opacity;
  }
  @keyframes sale1 {
    0%   { transform: translate(0, 0) scale(0.55); opacity: 0; }
    12%  { opacity: 0.85; }
    50%  { transform: translate(14px, -121px) scale(1); opacity: 0.9; }
    85%  { opacity: 0.5; }
    100% { transform: translate(28px, -242px) scale(1.12); opacity: 0; }
  }
  @keyframes sale2 {
    0%   { transform: translate(0, 0) scale(0.55); opacity: 0; }
    12%  { opacity: 0.85; }
    50%  { transform: translate(-18px, -120px) scale(1); opacity: 0.9; }
    85%  { opacity: 0.5; }
    100% { transform: translate(-36px, -241px) scale(1.12); opacity: 0; }
  }
  @keyframes sale3 {
    0%   { transform: translate(0, 0) scale(0.55); opacity: 0; }
    12%  { opacity: 0.85; }
    50%  { transform: translate(-17px, -167px) scale(1); opacity: 0.9; }
    85%  { opacity: 0.5; }
    100% { transform: translate(-33px, -335px) scale(1.12); opacity: 0; }

  @keyframes sale4 {

    12%  { opacity: 0.85; }
    50%  { transform: translate(-17px, -129px) scale(1); opacity: 0.9; }
    85%  { opacity: 0.5; }
    100% { transform: translate(-34px, -258px) scale(1.12); opacity: 0; }
  }
  @keyframes sale5 {
    0%   { transform: translate(0, 0) scale(0.55); opacity: 0; }
    12%  { opacity: 0.85; }
    50%  { transform: translate(-11px, -149px) scale(1); opacity: 0.9; }
    85%  { opacity: 0.5; }
    100% { transform: translate(-22px, -299px) scale(1.12); opacity: 0; }
  }
  @keyframes sale6 {
    0%   { transform: translate(0, 0) scale(0.55); opacity: 0; }
    12%  { opacity: 0.85; }
    50%  { transform: translate(17px, -151px) scale(1); opacity: 0.9; }
    85%  { opacity: 0.5; }
    100% { transform: translate(34px, -303px) scale(1.12); opacity: 0; }
  }
  @keyframes sale7 {
    0%   { transform: translate(0, 0) scale(0.55); opacity: 0; }
    12%  { opacity: 0.85; }
    50%  { transform: translate(16px, -118px) scale(1); opacity: 0.9; }
    85%  { opacity: 0.5; }
    100% { transform: translate(32px, -237px) scale(1.12); opacity: 0; }
  }
  @keyframes sale8 {
    0%   { transform: translate(0, 0) scale(0.55); opacity: 0; }
    12%  { opacity: 0.85; }
    50%  { transform: translate(0px, -144px) scale(1); opacity: 0.9; }
    85%  { opacity: 0.5; }
    100% { transform: translate(0px, -289px) scale(1.12); opacity: 0; }
  }
  @keyframes sale9 {
    0%   { transform: translate(0, 0) scale(0.55); opacity: 0; }
    12%  { opacity: 0.85; }
    50%  { transform: translate(-9px, -159px) scale(1); opacity: 0.9; }
    85%  { opacity: 0.5; }
    100% { transform: translate(-17px, -319px) scale(1.12); opacity: 0; }
  }
  @keyframes sale10 {
    0%   { transform: translate(0, 0) scale(0.55); opacity: 0; }
    12%  { opacity: 0.85; }
    50%  { transform: translate(-7px, -165px) scale(1); opacity: 0.9; }
    85%  { opacity: 0.5; }
    100% { transform: translate(-13px, -331px) scale(1.12); opacity: 0; }
  }
  @keyframes sale11 {
    0%   { transform: translate(0, 0) scale(0.55); opacity: 0; }
    12%  { opacity: 0.85; }
    50%  { transform: translate(13px, -130px) scale(1); opacity: 0.9; }
    85%  { opacity: 0.5; }
    100% { transform: translate(27px, -260px) scale(1.12); opacity: 0; }
  }
  .polpo {
    animation: dondolio 6s linear infinite;
    transform-origin: 50% 85%;
    will-change: transform;
  }
  @media (prefers-reduced-motion: reduce) {
    .payoff .uno, .payoff .due, .polpo, .orbita, .bolla { animation: none; }
    .bolle { display: none; }
  }
  .payoff p {
    font-family: 'Fraunces', Georgia, serif;
    font-weight: 700;
    text-transform: uppercase;
    color: var(--viola-scuro);
    line-height: 0.92;
    letter-spacing: -0.5px;
  }
  .payoff .uno {
    text-align: left;
    font-size: 42px;
  }
  .payoff .due {
    text-align: right;
    font-size: 34px;
    color: var(--viola);
    margin-top: 18px;
  }
  .payoff .due em {
    font-style: normal;
    color: var(--viola-scuro);
  }
  .payoff .grande {
    display: inline-block;
    color: #FDF1DE;
    -webkit-text-stroke: 10px var(--viola);
    paint-order: stroke fill;
    text-shadow: 0 2px 0 rgba(74,48,112,0.18);
  }
  .payoff .due .grande { font-size: 44px; }
  .payoff .uno .grande { font-size: 55px; }
  a.btn {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    padding: 19px 20px;
    margin-bottom: 16px;
    border-radius: 999px;
    background: rgba(255,255,255,0.22);
    backdrop-filter: blur(14px) saturate(180%);
    -webkit-backdrop-filter: blur(14px) saturate(180%);
    border: 1px solid rgba(255,255,255,0.55);
    box-shadow: 0 8px 26px rgba(74,48,112,0.18), inset 0 1px 1px rgba(255,255,255,0.75), inset 0 -6px 14px rgba(255,255,255,0.18);
    color: var(--viola-scuro);
    font-size: 17px;
    font-weight: 600;
    text-decoration: none;
    overflow: hidden;
    transition: background 0.2s ease, transform 0.2s ease, box-shadow 0.2s ease;
  }
  a.btn::after {
    content: '';
    position: absolute;
    top: 2px; left: 5%;
    width: 90%; height: 42%;
    border-radius: 999px;
    background: linear-gradient(180deg, rgba(255,255,255,0.55), rgba(255,255,255,0));
    pointer-events: none;
  }
  a.btn:hover {
    background: rgba(255,255,255,0.36);
    transform: translateY(-2px);
    box-shadow: 0 12px 32px rgba(74,48,112,0.24), inset 0 1px 1px rgba(255,255,255,0.85);
  }
  a.btn svg { width: 24px; height: 24px; }
  .marchio {
    width: 110px;
    height: auto;
    display: block;
    margin: 26px auto 10px;
    opacity: 0.9;
  }
  .footer {
    margin-top: 26px;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: rgba(74,48,112,0.55);
  }
